name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Firebase
        run: |
          mkdir -p public
          cp -r * public/ || true
          ls -la public/  # Debug: show what files exist

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CONTRASTX_WRITEUPS }}'
          channelId: live
          projectId: contrastx-writeups
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
