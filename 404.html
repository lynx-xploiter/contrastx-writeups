<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://contrastx-writeups.vercel.app/404.html">
    <title>404 | ACCESS_DENIED</title>
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            text-shadow: 0 0 5px #00ff00;
            overflow: hidden;
        }

        /* Scanline effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .error-code { font-size: clamp(4rem, 15vw, 7rem); margin: 0; color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        
        .message { 
            font-size: 1.2rem; 
            margin-bottom: 20px; 
            border-right: 2px solid #00ff00; 
            white-space: nowrap; 
            overflow: hidden; 
            width: 26ch; 
            animation: typing 2.5s steps(26), blink .5s step-end infinite; 
        }

        @keyframes typing { from { width: 0 } }
        @keyframes blink { 50% { border-color: transparent } }

        .btn { 
            color: #0a0a0a; 
            background: #00ff00; 
            padding: 12px 24px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            z-index: 3;
        }

        .btn:hover { 
            background: #ffffff; 
            box-shadow: 0 0 20px #ffffff; 
            transform: scale(1.05);
        }

        .sub-text { opacity: 0.7; margin-bottom: 30px; text-align: center; max-width: 80%; }
    </style>
</head>
<body>
    <h1 class="error-code">404</h1>
    <p class="message">STATUS: TARGET_NOT_FOUND...</p>
    <p class="sub-text">The requested internal resource is unavailable or encrypted.</p>
    <a href="/" class="btn">> RETURN_TO_HOME_BASE</a>
</body>
</html>
